<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study - Riwayat Pendidikan</title>
    <style type="text/css">
        body {
            background-color: white;
            padding: 20px;
            font-family: Arial, sans-serif;
            margin: 0;
            color: #333;
        }

        h1 {
            color: #667eea;
            text-align: center;
            font-size: 1.6em;
            margin-bottom: 25px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        ol {
            background-color: #f9f9f9;
            padding: 20px 40px;
            border-radius: 5px;
            border-left: 3px solid #667eea;
        }

        li {
            margin-bottom: 12px;
            padding: 10px 12px;
            background-color: white;
            border-radius: 3px;
        }

        b {
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Riwayat Pendidikan</h1>

    <ol type="1">
        <li><b>SD:</b> SDN 1 Gandul</li>
        <li><b>SMP:</b> SMPIP As-Sa'adatain</li>
        <li><b>SMA:</b> MAN 11 Jakarta</li>
        <li><b>Kuliah:</b> STT Terpadu Nurul Fikri</li>
    </ol>
</body>
</html>
