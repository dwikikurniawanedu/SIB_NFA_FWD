<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Left Sidebar</title>
    <style type="text/css">
        body {
            background-color: #f0f0f0;
            padding: 10px;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        h2 {
            text-align: center;
            color: #667eea;
            font-size: 1.1em;
            margin-bottom: 15px;
            font-weight: bold;
        }

        fieldset {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 15px;
            background-color: white;
        }

        legend {
            color: #667eea;
            font-weight: bold;
            padding: 0 5px;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        li {
            margin-bottom: 8px;
            padding: 6px;
            background-color: #f9f9f9;
            border-left: 3px solid #667eea;
            border-radius: 3px;
        }

        a {
            text-decoration: none;
            color: #667eea;
            font-weight: 500;
        }

        a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h2>Sosial Media Teman</h2>

    <fieldset>
        <legend>Instagram</legend>
        <ul>
            <li><a href="https://instagram.com/ainunnisa.wn06" target="_blank">nun05</a></li>
            <li><a href="https://instagram.com/tayo.rhdn" target="_blank">Rahardian Prasetyo</a></li>
            <li><a href="https://instagram.com/syahrularc2_" target="_blank">syahrul</a></li>
            <li><a href="https://instagram.com/mhmmddhaffa" target="_blank">D</a></li>
            <li><a href="https://instagram.com/rizqi_23m" target="_blank">Rizqi Fadilah</a></li>
        </ul>
    </fieldset>
</body>
</html>
