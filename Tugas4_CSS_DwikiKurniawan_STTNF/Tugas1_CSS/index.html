<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV_Dwiki Kurniawan-STT NF</title>
    <style type="text/css">
        /* Internal StyleSheet - Penerapan CSS Dasar */
        
        /* Selector Tag */
        body {
            background-color: #f5f5f5;
            color: #333;
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1 {
            color: #667eea;
            text-align: center;
        }

        h3 {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        h5 {
            text-align: center;
            color: #666;
            font-size: 0.9em;
        }

        p {
            text-align: center;
            margin: 10px 0;
        }

        ol {
            background-color: white;
            padding: 20px 40px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        li {
            margin-bottom: 10px;
            padding: 8px;
            background-color: #f9f9f9;
            border-left: 3px solid #667eea;
        }

        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid #667eea;
            display: block;
            margin: 0 auto;
        }

        hr {
            border: none;
            border-top: 2px solid #ddd;
            margin: 30px 0;
        }

        /* Selector Class */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header {
            background-color: #667eea;
            color: white;
            padding: 30px;
            text-align: center;
            border-radius: 5px;
            margin-bottom: 30px;
        }

        .header h1 {
            color: white;
            margin-top: 0;
        }

        .header p {
            color: white;
            margin: 10px 0;
        }

        .quote-section {
            background-color: #f0f0f0;
            padding: 20px;
            text-align: center;
            border-left: 4px solid #667eea;
            margin: 30px 0;
            border-radius: 5px;
        }

        .quote-section sup {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .footer {
            background-color: #667eea;
            color: white;
            text-align: center;
            padding: 20px;
            border-radius: 5px;
            margin-top: 30px;
        }

        /* Selector ID */
        #intro {
            font-style: italic;
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>DWIKI KURNIAWAN</h1>
            <p><b>Kampus:</b> STT Terpadu Nurul Fikri</p>
            <img src="https://dwikiport.vercel.app/images/Photo.jpeg" alt="Foto Profil Dwiki">
        </div>

        <hr>

        <h3>Pendidikan</h3>
        <ol type="1">
            <li><b>SD:</b> SDN 1 Gandul</li>
            <li><b>SMP:</b> SMPIP As-Sa'adatain</li>
            <li><b>SMA:</b> MAN 11 Jakarta</li>
            <li><b>Kuliah:</b> STT Terpadu Nurul Fikri</li>
        </ol>

        <hr>

        <div class="quote-section">
            <sup><b>Quote:</b></sup>
            <sub>"The only way to do great work is to love what you do."</sub>
        </div>

        <hr>

        <div class="footer">
            <h5>&copy; 2026 Dwiki Kurniawan. All rights reserved.</h5>
        </div>
    </div>
</body>
</html>
